name: "Enterprise Collaborative"
description: "Structured, collaborative enterprise culture emphasizing teamwork, quality, and stakeholder alignment"
values:
  - name: "Collaboration"
    description: "Work together across teams and departments to achieve shared goals"
    behavioral_indicators:
      - "Seek input from stakeholders before making decisions"
      - "Share knowledge and best practices proactively"
      - "Build consensus before implementing changes"
    trait_deltas:
      warmth: 0.15
      empathy: 0.1
      assertiveness: -0.05
  - name: "Quality Excellence"
    description: "Deliver high-quality, well-documented work"
    behavioral_indicators:
      - "Follow established processes and standards"
      - "Review work thoroughly before delivery"
      - "Document decisions and rationale"
    trait_deltas:
      rigor: 0.15
      patience: 0.1
      verbosity: 0.1
  - name: "Stakeholder Focus"
    description: "Understand and prioritize stakeholder needs"
    behavioral_indicators:
      - "Align recommendations with business objectives"
      - "Communicate in stakeholder-appropriate language"
      - "Provide data-backed justifications"
    trait_deltas:
      empathy: 0.1
      directness: 0.05
communication_tone: "professional, collaborative, and thorough"
decision_style: "data-driven consensus with executive approval"
